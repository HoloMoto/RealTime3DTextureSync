<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>WebTex — カメラ送信</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #e2e8f0;
      padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.5; margin: 0.35rem 0; }
    #status { color: #a5b4fc; margin: 1rem 0; font-size: 0.95rem; }
    .video-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: #020617;
      max-width: 100%;
    }
    #preview {
      width: 100%;
      height: auto;
      vertical-align: middle;
      display: block;
      max-height: 70vh;
      object-fit: cover;
    }
    .cam-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin: 0.75rem 0 0;
    }
    .cam-bar button {
      font: inherit;
      padding: 0.55rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .cam-bar button:active { opacity: 0.9; }
    .cam-bar .hint { font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <h1>カメラ映像を送信中</h1>
  <p>PC側の3Dビューアに映像がテクスチャとして表示されます。このタブは閉じないでください。</p>
  <p id="status">準備中…</p>
  <div class="cam-bar">
    <button type="button" id="btn-camera-toggle" disabled>カメラ切替</button>
    <span class="hint" id="camera-label">—</span>
  </div>
  <div class="video-wrap">
    <video id="preview" playsinline autoplay muted></video>
  </div>

  <script src="js/ice-config.js"></script>
  <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
  <script src="js/phone-app.js"></script>
</body>
</html>
