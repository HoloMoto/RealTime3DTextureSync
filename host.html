<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebTex — ホスト（3D）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #e2e8f0;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 1rem;
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: #151c33;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .panel h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .panel p { margin: 0.35rem 0; font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
    #status { font-size: 0.9rem; color: #a5b4fc; margin-top: 0.75rem; }
    #qr-wrap { margin: 1rem 0; display: flex; justify-content: center; }
    #qr-canvas { border-radius: 8px; }
    #room-id {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: #cbd5e1;
    }
    #phone-link { color: #818cf8; word-break: break-all; font-size: 0.75rem; }
    #canvas3d {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 12px;
      display: block;
      background: #020617;
      touch-action: none;
      cursor: grab;
    }
    #canvas3d:active {
      cursor: grabbing;
    }
    .steps { padding-left: 1.1rem; margin: 0.5rem 0 0; font-size: 0.82rem; color: #94a3b8; }
    .steps li { margin: 0.25rem 0; }
    .model-row {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
    }
    .model-row label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    .model-row input[type="file"] {
      font-size: 0.75rem;
      max-width: 100%;
    }
    .model-row .row-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
      align-items: center;
    }
    .model-row button {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.35rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .model-row select {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.45rem 0.5rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #0f172a;
      color: #e2e8f0;
      font: inherit;
      font-size: 0.82rem;
    }
    .shape-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      margin-top: 0.75rem;
    }
    .shape-label { font-size: 0.8rem; color: #94a3b8; margin-right: 0.25rem; }
    .shape-btn {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .shape-btn.is-active {
      border-color: #818cf8;
      background: #312e81;
      color: #fff;
    }
    #btn-gyro.is-active {
      border-color: #34d399;
      background: #064e3b;
      color: #ecfdf5;
    }
    .stage-wrap { position: relative; }
    .stage-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      background: rgba(15, 23, 42, 0.85);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .stage-toolbar button {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .stage-toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    body.view-immersive {
      overflow: hidden;
    }
    body.view-immersive .sidebar {
      display: none !important;
    }
    body.view-immersive .layout {
      display: block;
      max-width: none;
      padding: 0;
      margin: 0;
      min-height: 100vh;
      height: 100vh;
    }
    body.view-immersive .stage-wrap {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      border-radius: 0;
      border: none;
    }
    body.view-immersive .stage-toolbar {
      flex-shrink: 0;
    }
    body.view-immersive #canvas3d {
      flex: 1;
      width: 100%;
      height: auto;
      min-height: 0;
      aspect-ratio: auto;
      border-radius: 0;
    }
    .immersive-exit {
      display: none;
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 210;
      font: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0;
      cursor: pointer;
    }
    body.view-immersive .immersive-exit {
      display: block;
    }
  </style>
</head>
<body>
  <button type="button" class="immersive-exit" id="btn-exit-immersive" aria-label="パネルを表示">
    ← パネル
  </button>
  <div class="layout">
    <div class="panel sidebar">
      <h1>スマホを接続</h1>
      <p>先にこのページを開いた状態で、QRをスマホで読み取ってください。</p>
      <ol class="steps">
        <li>このPCでこのページを開く</li>
        <li>スマホでQRをスキャン（GitHub Pagesの <code>phone.html</code> が開きます）</li>
        <li>カメラ許可 → 右の3Dに映像が貼り付きます</li>
      </ol>
      <div class="shape-bar">
        <span class="shape-label">3D形状</span>
        <button type="button" class="shape-btn is-active" id="shape-cube">キューブ</button>
        <button type="button" class="shape-btn" id="shape-sphere">球体</button>
      </div>
      <div class="model-row">
        <label for="obj-file">OBJモデル（.obj）</label>
        <input type="file" id="obj-file" accept=".obj,text/plain" />
        <div class="row-btns">
          <button type="button" id="btn-obj-clear">標準形状に戻す</button>
        </div>
        <label for="video-material-select">映像テクスチャを貼るマテリアル</label>
        <select id="video-material-select" aria-label="映像を貼るマテリアル"></select>
      </div>
      <p style="font-size:0.8rem;color:#64748b;margin:0.5rem 0 0;">
        3Dはドラッグ／ピンチで視点変更。iPhone / iPad の Safari は <strong>WebXR AR 非対応</strong>のため「ジャイロ追従」を使ってください。Android Chrome では「ARモード」が使える場合があります。
      </p>
      <p id="status">シグナリングを準備中…</p>
      <div id="qr-wrap" aria-label="接続用QR"></div>
      <p>ルーム ID: <span id="room-id"></span></p>
      <p><a id="phone-link" href="#" rel="noopener"></a></p>
    </div>
    <div class="panel stage-wrap" id="stage-wrap" style="padding: 0; overflow: hidden;">
      <div class="stage-toolbar">
        <button type="button" id="btn-immersive">3D全面表示</button>
        <span class="shape-label" style="margin-left:0.35rem">形状</span>
        <button type="button" class="shape-btn is-active" id="shape-cube-tb">キューブ</button>
        <button type="button" class="shape-btn" id="shape-sphere-tb">球体</button>
        <label class="shape-label" for="video-material-select-tb" style="margin-left:0.35rem">映像→</label>
        <select id="video-material-select-tb" aria-label="映像を貼るマテリアル" style="max-width:11rem;font:inherit;font-size:0.75rem;padding:0.25rem 0.35rem;border-radius:6px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,0.35)"></select>
        <button type="button" id="btn-gyro">ジャイロ追従</button>
        <button type="button" id="btn-ar" disabled hidden>ARモード</button>
      </div>
      <canvas id="canvas3d"></canvas>
    </div>
  </div>

  <!-- スマホ用ページだけ GitHub Pages に置く場合: 下記に phone.html の完全URLを設定 -->
  <script>
    window.WEBTEX_PHONE_PAGE = '';
  </script>
  <!-- OrbitControls が内部で bare import "three" を使うため必須（無いと 3D が一切動かない） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
    }
  }
  </script>
  <script src="js/ice-config.js"></script>
  <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
  <script src="js/qrcode.min.js"></script>
  <script type="module" src="js/host-3d.js"></script>
  <script defer src="js/host-app.js"></script>
</body>
</html>
