<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebTex — ホスト（3D）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #e2e8f0;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 1rem;
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: #151c33;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .panel h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .panel p { margin: 0.35rem 0; font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
    #status { font-size: 0.9rem; color: #a5b4fc; margin-top: 0.75rem; }
    #qr-wrap { margin: 1rem 0; display: flex; justify-content: center; }
    #qr-canvas { border-radius: 8px; }
    #room-id {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: #cbd5e1;
    }
    #phone-link { color: #818cf8; word-break: break-all; font-size: 0.75rem; }
    #canvas3d {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 12px;
      display: block;
      background: #020617;
    }
    .steps { padding-left: 1.1rem; margin: 0.5rem 0 0; font-size: 0.82rem; color: #94a3b8; }
    .steps li { margin: 0.25rem 0; }
    .shape-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      margin-top: 0.75rem;
    }
    .shape-label { font-size: 0.8rem; color: #94a3b8; margin-right: 0.25rem; }
    .shape-btn {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .shape-btn.is-active {
      border-color: #818cf8;
      background: #312e81;
      color: #fff;
    }
    .stage-wrap { position: relative; }
    .stage-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      background: rgba(15, 23, 42, 0.85);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .stage-toolbar button {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
    }
    .stage-toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    body.view-immersive {
      overflow: hidden;
    }
    body.view-immersive .sidebar {
      display: none !important;
    }
    body.view-immersive .layout {
      display: block;
      max-width: none;
      padding: 0;
      margin: 0;
      min-height: 100vh;
      height: 100vh;
    }
    body.view-immersive .stage-wrap {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      border-radius: 0;
      border: none;
    }
    body.view-immersive .stage-toolbar {
      flex-shrink: 0;
    }
    body.view-immersive #canvas3d {
      flex: 1;
      width: 100%;
      height: auto;
      min-height: 0;
      aspect-ratio: auto;
      border-radius: 0;
    }
    .immersive-exit {
      display: none;
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 210;
      font: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0;
      cursor: pointer;
    }
    body.view-immersive .immersive-exit {
      display: block;
    }
  </style>
</head>
<body>
  <button type="button" class="immersive-exit" id="btn-exit-immersive" aria-label="パネルを表示">
    ← パネル
  </button>
  <div class="layout">
    <div class="panel sidebar">
      <h1>スマホを接続</h1>
      <p>先にこのページを開いた状態で、QRをスマホで読み取ってください。</p>
      <ol class="steps">
        <li>このPCでこのページを開く</li>
        <li>スマホでQRをスキャン（GitHub Pagesの <code>phone.html</code> が開きます）</li>
        <li>カメラ許可 → 右の3Dに映像が貼り付きます</li>
      </ol>
      <div class="shape-bar">
        <span class="shape-label">3D形状</span>
        <button type="button" class="shape-btn is-active" id="shape-cube">キューブ</button>
        <button type="button" class="shape-btn" id="shape-sphere">球体</button>
      </div>
      <p style="font-size:0.8rem;color:#64748b;margin:0.5rem 0 0;">スマホ同士なら右の「AR」でカメラ越しに3Dを重ね表示できます（対応端末のみ）。</p>
      <p id="status">シグナリングを準備中…</p>
      <div id="qr-wrap" aria-label="接続用QR"></div>
      <p>ルーム ID: <span id="room-id"></span></p>
      <p><a id="phone-link" href="#" rel="noopener"></a></p>
    </div>
    <div class="panel stage-wrap" id="stage-wrap" style="padding: 0; overflow: hidden;">
      <div class="stage-toolbar">
        <button type="button" id="btn-immersive">3D全面表示</button>
        <span class="shape-label" style="margin-left:0.35rem">形状</span>
        <button type="button" class="shape-btn is-active" id="shape-cube-tb">キューブ</button>
        <button type="button" class="shape-btn" id="shape-sphere-tb">球体</button>
        <button type="button" id="btn-ar" disabled hidden>ARモード</button>
      </div>
      <canvas id="canvas3d"></canvas>
    </div>
  </div>

  <!-- スマホ用ページだけ GitHub Pages に置く場合: 下記に phone.html の完全URLを設定 -->
  <script>
    window.WEBTEX_PHONE_PAGE = '';
  </script>
  <script src="js/ice-config.js"></script>
  <!-- r170 以降は three.min.js が無いため、グローバル THREE 用に 0.159 を固定 -->
  <script src="https://unpkg.com/three@0.159.0/build/three.min.js"></script>
  <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
  <!-- npm「qrcode」の toCanvas とは別物。qrcodejs（コンストラクタのみ）を同梱 -->
  <script src="js/qrcode.min.js"></script>

  <script>
    (function () {
      const canvas = document.getElementById('canvas3d');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.xr.enabled = true;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020617);

      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.set(0, 0.6, 3.2);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x334455, 0.9);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 0.5);
      dir.position.set(2, 4, 3);
      scene.add(dir);

      const placeholder = new THREE.TextureLoader().load(
        'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=='
      );
      const mat = new THREE.MeshStandardMaterial({
        map: placeholder,
        roughness: 0.35,
        metalness: 0.15,
      });
      let currentShape = 'cube';
      const meshRestPosition = new THREE.Vector3(0, 0, 0);
      const meshArPosition = new THREE.Vector3(0, 1.45, -2.4);
      let mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), mat);
      scene.add(mesh);

      const cubeBtn = document.getElementById('shape-cube');
      const sphereBtn = document.getElementById('shape-sphere');
      const cubeTb = document.getElementById('shape-cube-tb');
      const sphereTb = document.getElementById('shape-sphere-tb');

      function updateShapeButtons() {
        var c = currentShape === 'cube';
        cubeBtn.classList.toggle('is-active', c);
        sphereBtn.classList.toggle('is-active', !c);
        cubeTb.classList.toggle('is-active', c);
        sphereTb.classList.toggle('is-active', !c);
      }

      function setShape(kind) {
        if (kind !== 'cube' && kind !== 'sphere') return;
        if (kind === currentShape) return;
        currentShape = kind;
        mesh.geometry.dispose();
        mesh.geometry =
          kind === 'cube'
            ? new THREE.BoxGeometry(1.2, 1.2, 1.2)
            : new THREE.SphereGeometry(0.78, 48, 32);
        updateShapeButtons();
      }

      cubeBtn.addEventListener('click', function () {
        setShape('cube');
      });
      sphereBtn.addEventListener('click', function () {
        setShape('sphere');
      });
      cubeTb.addEventListener('click', function () {
        setShape('cube');
      });
      sphereTb.addEventListener('click', function () {
        setShape('sphere');
      });

      const btnImmersive = document.getElementById('btn-immersive');
      const btnExitImmersive = document.getElementById('btn-exit-immersive');
      const btnAr = document.getElementById('btn-ar');

      function setImmersive(on) {
        document.body.classList.toggle('view-immersive', on);
        btnImmersive.textContent = on ? '全面表示を終了' : '3D全面表示';
      }

      btnImmersive.addEventListener('click', function () {
        setImmersive(!document.body.classList.contains('view-immersive'));
      });
      btnExitImmersive.addEventListener('click', function () {
        setImmersive(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && document.body.classList.contains('view-immersive')) {
          setImmersive(false);
        }
      });

      let xrSession = null;
      var savedSceneBackground = scene.background;

      function applyARVisuals(active) {
        if (active) {
          scene.background = null;
          renderer.setClearColor(0x000000, 0);
        } else {
          scene.background = savedSceneBackground;
          renderer.setClearColor(0x000000, 1);
        }
      }

      function bindARSessionEnd(session) {
        session.addEventListener('end', function () {
          xrSession = null;
          mesh.position.copy(meshRestPosition);
          applyARVisuals(false);
        });
      }

      async function tryEnterAR() {
        if (!navigator.xr) return;
        var supported = false;
        try {
          supported = await navigator.xr.isSessionSupported('immersive-ar');
        } catch (e) {
          return;
        }
        if (!supported) {
          window.alert('この端末・ブラウザは AR（immersive-ar）に対応していません。');
          return;
        }
        try {
          var session = await navigator.xr.requestSession('immersive-ar', {
            requiredFeatures: ['local'],
            optionalFeatures: ['dom-overlay', 'hit-test'],
            domOverlay: { root: document.body },
          });
          xrSession = session;
          applyARVisuals(true);
          renderer.xr.setSession(session);
          mesh.position.copy(meshArPosition);
          bindARSessionEnd(session);
        } catch (e1) {
          try {
            var session2 = await navigator.xr.requestSession('immersive-ar', {
              requiredFeatures: ['local'],
            });
            xrSession = session2;
            applyARVisuals(true);
            renderer.xr.setSession(session2);
            mesh.position.copy(meshArPosition);
            bindARSessionEnd(session2);
          } catch (e2) {
            console.error(e2);
            window.alert('AR を開始できませんでした（HTTPS・権限・端末を確認してください）。');
          }
        }
      }

      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then(function (ok) {
          if (ok) {
            btnAr.hidden = false;
            btnAr.disabled = false;
            btnAr.addEventListener('click', tryEnterAR);
          }
        });
      }

      function resize() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', resize);
      resize();

      const clock = new THREE.Clock();
      renderer.setAnimationLoop(function () {
        const t = clock.getElapsedTime();
        mesh.rotation.x = t * 0.31;
        mesh.rotation.y = t * 0.42;
        if (mat.map && mat.map.isVideoTexture) {
          mat.map.needsUpdate = true;
        }
        renderer.render(scene, camera);
      });

      window.__webtexSetVideoStream = function (stream) {
        const video = document.createElement('video');
        video.playsInline = true;
        video.muted = true;
        video.autoplay = true;
        video.srcObject = stream;
        video.play().catch(function () {});

        const tex = new THREE.VideoTexture(video);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        if (mat.map && mat.map.dispose) mat.map.dispose();
        mat.map = tex;
        mat.needsUpdate = true;
      };
    })();
  </script>
  <script src="js/host-app.js"></script>
</body>
</html>
